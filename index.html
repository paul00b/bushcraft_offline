<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bushcraft">
  <meta name="description" content="Guide de terrain bushcraft — offline">

  <title>Bushcraft Field Guide</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="app">
    <!-- Contenu rendu dynamiquement par app.js -->
    <div class="splash">
      <svg class="splash-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
        <path d="M32 8 C24 20 18 26 20 34 C21 39 25 43 30 44 C27 38 28 32 31 29 C31 35 33 40 36 44 C39 43 43 39 44 34 C46 26 40 20 32 8Z" fill="#4a7c59"/>
        <path d="M32 22 C29 28 28 33 30 39 C31 42 32 44 36 44 C37 41 37 37 35 33 C36 36 37 39 38 42 C40 37 40 30 32 22Z" fill="#1e3828"/>
      </svg>
      <p class="splash-text">Chargement…</p>
    </div>
  </div>

  <!-- Overlay de recherche -->
  <div id="search-overlay" class="search-overlay hidden" role="dialog" aria-label="Résultats de recherche">
    <div id="search-results" class="search-results"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script type="module" src="/data/content.js"></script>
  <script type="module" src="/js/db.js"></script>
  <script type="module" src="/js/router.js"></script>
  <script type="module" src="/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
